<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Form Input - 20230140161</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">Form Input Mahasiswa [cite: 85]</h5>
            </div>
            <div class="card-body">
                <form th:action="@{/save}" th:object="${user}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Nama</label>
                        <input type="text" th:field="*{nama}" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">NIM</label>
                        <input type="text" th:field="*{nim}" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label d-block">Jenis Kelamin</label>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" th:field="*{jenisKelamin}" value="Laki-laki" id="lk">
                            <label class="form-check-label" for="lk">Laki-laki</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" th:field="*{jenisKelamin}" value="Perempuan" id="pr">
                            <label class="form-check-label" for="pr">Perempuan</label>
                        </div>
                    </div>
                    <hr>
                    <div class="d-flex justify-content-between">
                        <a th:href="@{/home}" class="btn btn-secondary">Kembali ke Home</a>
                        <button type="submit" class="btn btn-primary">Submit Data</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
