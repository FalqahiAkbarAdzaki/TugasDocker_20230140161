<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Home - 20230140161</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>MY Website - 20230140161</h2>
    <a th:href="@{/logout}" class="btn btn-outline-danger">Logout</a>
</div>

<div class="alert alert-info">Selamat datang di aplikasi!</div>

<div class="card mb-4">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="mb-0">Data Mahasiswa</h5>
        <a th:href="@{/form}" class="btn btn-success btn-sm">Input Data Mahasiswa</a>
    </div>
    <div class="card-body">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
            <tr>
                <th>No</th>
                <th>Nama</th>
                <th>NIM</th>
                <th>Jenis Kelamin</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${listMhs.empty}">
                <td colspan="4" class="text-center text-muted">Belum ada data [cite: 84]</td>
            </tr>
            <tr th:each="mhs, iterStat : ${listMhs}">
                <td th:text="${iterStat.count}"></td>
                <td th:text="${mhs.nama}"></td>
                <td th:text="${mhs.nim}"></td>
                <td th:text="${mhs.jenisKelamin}"></td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
